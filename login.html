<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8"><title>登录 - 导航页管理</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-card">
            <h1>管理员登录</h1>
            <form id="loginForm">
                <input type="text" id="username" placeholder="用户名" required style="width:100%;padding:10px;margin:10px 0;">
                <input type="password" id="password" placeholder="密码" required style="width:100%;padding:10px;margin:10px 0;">
                <button type="submit" class="btn btn-primary w-full">登录</button>
            </form>
        </div>
    </div>
    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const u = document.getElementById('username').value.trim();
            const p = document.getElementById('password').value;
            // 直接在这里校验你设置的账号密码
            if (u === "admin" && p === "123..sws..716") {
                localStorage.setItem('currentUser', JSON.stringify({
                    username: u,
                    password: p, // 关键：存入密码供后台使用
                    expiresAt: Date.now() + 30 * 24 * 60 * 60 * 1000
                }));
                alert('登录成功！');
                window.location.href = 'admin.html';
            } else {
                alert('账号或密码不正确！');
            }
        });
    </script>
</body>
</html>
