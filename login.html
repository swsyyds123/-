<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 导航页</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">
                        <i class="fas fa-compass"></i>
                    </div>
                    <h1>欢迎回来</h1>
                    <p>请登录您的账户</p>
                </div>
                
                <form class="auth-form" id="loginForm">
                    <div class="form-group">
                        <label for="username">用户名或邮箱</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="username" placeholder="请输入用户名或邮箱" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">密码</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="请输入密码" required>
                        </div>
                    </div>
                    
                    <div class="form-group form-check">
                        <label class="checkbox-label">
                            <input type="checkbox" id="rememberMe">
                            <span>免登录</span>
                        </label>
                    </div>

                    <div class="form-group remember-duration" id="rememberDuration" style="display: none;">
                        <label class="radio-label">
                            <input type="radio" name="rememberDays" value="7" checked>
                            <span>7天内免登录</span>
                        </label>
                        <label class="radio-label">
                            <input type="radio" name="rememberDays" value="30">
                            <span>30天内免登录</span>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-full">
                        <i class="fas fa-sign-in-alt"></i> 登录
                    </button>
                </form>
                
                <div class="auth-footer">
                    <p>
                        没有账户？<a href="register.html" class="auth-link">立即注册</a>
                    </p>
                </div>
            </div>
            
            <div class="auth-links">
                <a href="index.html" class="back-link">
                    <i class="fas fa-home"></i> 返回首页
                </a>
                <nav class="footer-links auth-footer-links" aria-label="底部导航">
                    <a href="index.html">首页</a>
                    <a href="about.html">关于我们</a>
                    <a href="feedback.html">用户反馈</a>
                    <a href="admin.html">后台管理</a>
                </nav>
            </div>
        </div>
    </div>

    <script>
        const rememberMe = document.getElementById('rememberMe');
        const rememberDuration = document.getElementById('rememberDuration');

        rememberMe.addEventListener('change', function() {
            rememberDuration.style.display = this.checked ? 'flex' : 'none';
        });

        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            
            if (!username || !password) {
                alert('请填写完整的用户名和密码');
                return;
            }

            const user = users.find(function(item) {
                return (item.username === username || item.email === username) && item.password === password;
            });
            
            if (!user) {
                alert('账号或密码错误，请先注册或检查输入');
                return;
            }

            const selectedDays = Number(document.querySelector('input[name="rememberDays"]:checked').value);
            const sessionHours = 2;
            const expiresAt = rememberMe.checked
                ? Date.now() + selectedDays * 24 * 60 * 60 * 1000
                : Date.now() + sessionHours * 60 * 60 * 1000;
            
            localStorage.setItem('currentUser', JSON.stringify({
                id: user.id,
                username: user.username,
                loginTime: Date.now(),
                expiresAt: expiresAt
            }));
            
            alert('登录成功');
            const params = new URLSearchParams(window.location.search);
            window.location.href = params.get('redirect') === 'admin' ? 'admin.html' : 'index.html';
        });
    </script>
</body>
</html>
