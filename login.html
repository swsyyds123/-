<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - 导航页管理</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">
                        <i class="fas fa-compass"></i>
                    </div>
                    <h1>管理员登录</h1>
                    <p>请输入您的管理账号</p>
                </div>
                
                <form class="auth-form" id="loginForm">
                    <div class="form-group">
                        <label for="username">用户名</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="username" placeholder="admin" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">密码</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="password" placeholder="请输入密码" required>
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-full">
                        <i class="fas fa-sign-in-alt"></i> 登录后台
                    </button>
                </form>
                
                <!-- 注册按钮和链接已在这里彻底删除 -->
            </div>
            
            <div class="auth-links">
                <a href="index.html" class="back-link">
                    <i class="fas fa-home"></i> 返回首页
                </a>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('loginForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            // ==========================================
            // 在这里修改你想要的唯一账号和密码
            // ==========================================
            const MY_ADMIN_USER = "admin"; 
            const MY_ADMIN_PASS = "123..sws..716"; 
            
            if (username === MY_ADMIN_USER && password === MY_ADMIN_PASS) {
                // 登录成功，保存登录凭证
                // admin.js 会检查 localStorage 里的 currentUser 和 expiresAt
                localStorage.setItem('currentUser', JSON.stringify({
                    username: username,
                    loginTime: Date.now(),
                    expiresAt: Date.now() + 30 * 24 * 60 * 60 * 1000 // 30天有效期
                }));
                
                alert('登录成功！');
                const params = new URLSearchParams(window.location.search);
                // 如果是从 admin 页面跳过来的，登录后跳回去，否则跳 index
                window.location.href = params.get('redirect') === 'admin' ? 'admin.html' : 'admin.html';
            } else {
                alert('账号或密码不正确！');
            }
        });
    </script>
</body>
</html>
