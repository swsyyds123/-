<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>关于我们 - 导航页</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<base target="_blank">
</head>
<body class="static-page">
    <div class="static-shell">
        <header class="static-header">
            <a href="index.html" class="static-brand">
                <i class="fas fa-compass"></i>
                <span>导航中心</span>
            </a>
            <nav class="static-nav" aria-label="主导航">
                <a href="index.html">首页</a>
                <a href="about.html" class="active">关于我们</a>
                <a href="feedback.html">用户反馈</a>
                <a href="javascript:void(0)" onclick="goAdmin()">后台管理</a>
            </nav>
        </header>

        <main class="static-main about-main">
            <section class="about-intro">
                <div>
                    <p class="static-eyebrow">About</p>
                    <h1>收集有趣网站，让打开网页这件事更顺手。</h1>
                    <p>
                        这个网站的初衷，是把散落在浏览器收藏夹、聊天记录和临时笔记里的有趣网站收集起来，
                        做成一个高效、便捷、自定义程度高的导航站。
                    </p>
                </div>
            </section>

            <section class="photo-carousel" aria-label="照片轮播">
                <img src="1.jpg" alt="关于我们照片 1" class="carousel-photo active">
                <img src="2.jpg" alt="关于我们照片 2" class="carousel-photo">
                <img src="3.jpg" alt="关于我们照片 3" class="carousel-photo">
                <div class="carousel-dots" aria-hidden="true">
                    <span class="active"></span>
                    <span></span>
                    <span></span>
                </div>
            </section>

            <section class="about-values">
                <div>
                    <i class="fas fa-bolt"></i>
                    <h2>高效</h2>
                    <p>常用入口集中管理，打开目标网站更快。</p>
                </div>
                <div>
                    <i class="fas fa-wand-magic-sparkles"></i>
                    <h2>有趣</h2>
                    <p>保留那些值得回访、值得分享的小站点。</p>
                </div>
                <div>
                    <i class="fas fa-sliders"></i>
                    <h2>自定义</h2>
                    <p>分类、链接、背景和布局都可以按习惯调整。</p>
                </div>
            </section>
        </main>

        <footer class="footer">
            <nav class="footer-links" aria-label="底部导航">
                <a href="index.html">首页</a>
                <a href="about.html">关于我们</a>
                <a href="feedback.html">用户反馈</a>
                <a href="javascript:void(0)" onclick="goAdmin()">后台管理</a>
            </nav>
            <p>导航页应用 © 2024</p>
        </footer>
    </div>

    <script>
        const photos = document.querySelectorAll('.carousel-photo');
        const dots = document.querySelectorAll('.carousel-dots span');
        let photoIndex = 0;

        setInterval(function() {
            photos[photoIndex].classList.remove('active');
            dots[photoIndex].classList.remove('active');
            photoIndex = (photoIndex + 1) % photos.length;
            photos[photoIndex].classList.add('active');
            dots[photoIndex].classList.add('active');
        }, 3000);
    </script>

<script>
function goAdmin() {
    const user = JSON.parse(localStorage.getItem('currentUser') || '{}');
    if (user && user.expiresAt && Date.now() < user.expiresAt) {
        window.location.href = 'admin.html';
    } else {
        window.location.href = 'login.html';
    }
}
</script>
</body>
</html>
