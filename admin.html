<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 导航页</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-page">
    <header class="admin-header">
        <div class="admin-header-content">
            <div class="logo"><span>导航页管理</span></div>
            <nav class="admin-top-nav">
                <button class="nav-item active" data-section="categories"><i class="fas fa-folder"></i> 分类管理</button>
                <button class="nav-item" data-section="links"><i class="fas fa-link"></i> 链接管理</button>
                <button class="nav-item" data-section="settings"><i class="fas fa-cog"></i> 个性化设置</button>
            </nav>
            <div class="header-actions">
                <button class="btn btn-secondary" onclick="window.open('index.html')"><i class="fas fa-eye"></i> 预览前台</button>
                <button class="btn btn-primary" onclick="location.href='index.html'"><i class="fas fa-home"></i> 返回首页</button>
                <button class="btn btn-danger" id="logoutBtn"><i class="fas fa-sign-out-alt"></i> 退出</button>
            </div>
        </div>
    </header>

    <main class="admin-main">
        <!-- 快捷添加 -->
        <div class="quick-add-section">
            <div class="quick-add-container">
                <div class="quick-add-form">
                    <div class="form-row">
                        <div class="form-group flex-1"><label>网站名称</label><input type="text" id="quickName" placeholder="名称"></div>
                        <div class="form-group flex-1"><label>网站地址</label><input type="url" id="quickUrl" placeholder="https://..."></div>
                        <div class="form-group"><label>所属分类</label><select id="quickCategory"></select></div>
                        <button class="btn btn-primary quick-add-btn" id="quickAddBtn"><i class="fas fa-plus"></i> 快速添加</button>
                    </div>
                </div>
            </div>
        </div>

        <div class="admin-content">
            <div class="admin-panel">
                <!-- 分类管理 -->
                <section id="categoriesSection" class="panel-section">
                    <div class="panel-header">
                        <div class="panel-title"><h2>分类管理</h2><p>按住左侧图标上下拖拽调整显示顺序</p></div>
                        <button class="btn btn-primary" id="addCategoryBtn"><i class="fas fa-plus"></i> 添加分类</button>
                    </div>
                    <div id="categoriesList" class="list-container sortable"></div>
                </section>

                <!-- 链接管理 -->
                <section id="linksSection" class="panel-section" style="display: none;">
                    <div class="panel-header">
                        <div class="panel-title"><h2>链接管理</h2></div>
                        <div class="integrated-search">
                            <select id="linkFilterCategory"><option value="">全部分类</option></select>
                            <input type="text" id="linkSearch" placeholder="搜索链接...">
                        </div>
                    </div>
                    <div id="linksList" class="list-container"></div>
                </section>

                <!-- 个性化设置 -->
                <section id="settingsSection" class="panel-section" style="display: none;">
                    <div class="settings-grid">
                        <div class="setting-card">
                            <h3>站点设置</h3>
                            <div class="form-group"><label>导航标题</label><input type="text" id="siteTitle"></div>
                        </div>
                        <div class="setting-card">
                            <h3>自定义背景</h3>
                            <div class="form-group"><label>背景图URL</label><input type="text" id="bgImageUrl" placeholder="在线图片链接"></div>
                            <div class="form-group">
                                <label>或本地上传</label>
                                <input type="file" id="localBgImage" accept="image/*" style="display:none">
                                <button class="btn btn-secondary w-full" onclick="document.getElementById('localBgImage').click()">选择文件</button>
                            </div>
                            <div id="bgPreviewContainer" class="bg-preview-container"></div>
                            <div class="bg-actions">
                                <button class="btn btn-primary" id="applyBgBtn">应用背景</button>
                                <button class="btn btn-danger" id="clearBgBtn">清除</button>
                            </div>
                        </div>
                    </div>
                    <div class="settings-actions">
                        <button class="btn btn-primary" id="saveSettingsBtn">保存全局设置</button>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- 分类弹窗 -->
    <div id="categoryModal" class="modal-overlay">
        <div class="modal-content small-modal">
            <div class="modal-header"><h2 id="categoryModalTitle">分类</h2><button class="modal-close">×</button></div>
            <div class="modal-body">
                <div class="form-group"><label>分类名称</label><input type="text" id="categoryName"></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary modal-close">取消</button>
                <button class="btn btn-primary" id="categoryModalSave">保存</button>
            </div>
        </div>
    </div>

    <!-- 链接弹窗 -->
    <div id="linkModal" class="modal-overlay">
        <div class="modal-content small-modal">
            <div class="modal-header"><h2 id="linkModalTitle">编辑链接</h2><button class="modal-close">×</button></div>
            <div class="modal-body">
                <div class="form-group"><label>名称</label><input type="text" id="linkName"></div>
                <div class="form-group"><label>网址</label><input type="url" id="linkUrl"></div>
                <div class="form-group"><label>分类</label><select id="linkCategory"></select></div>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary modal-close">取消</button>
                <button class="btn btn-primary" id="linkModalSave">保存</button>
            </div>
        </div>
    </div>

    <script src="admin.js"></script>
</body>
</html>
