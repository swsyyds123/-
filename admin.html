<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>后台管理 - 导航页</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="admin-page">
    <!-- 头部 -->
    <header class="admin-header">
        <div class="admin-header-content">
            <div class="logo">
                <span>导航页管理</span>
            </div>
            <nav class="admin-top-nav">
                <button class="nav-item active" data-section="categories">
                    <i class="fas fa-folder"></i> 分类管理
                </button>
                <button class="nav-item" data-section="links">
                    <i class="fas fa-link"></i> 链接管理
                </button>
                <button class="nav-item" data-section="settings">
                    <i class="fas fa-cog"></i> 个性化设置
                </button>
            </nav>
            <div class="header-actions">
                <button class="btn btn-secondary" id="previewBtn">
                    <i class="fas fa-eye"></i> 预览前台
                </button>
                <button class="btn btn-primary" id="backBtn">
                    <i class="fas fa-home"></i> 返回首页
                </button>
                <button class="btn btn-danger" id="logoutBtn">
                    <i class="fas fa-sign-out-alt"></i> 退出登录
                </button>
            </div>
        </div>
    </header>

    <main class="admin-main">
        <!-- 快捷添加链接 -->
        <div class="quick-add-section">
            <div class="quick-add-container">
                <div class="quick-add-header">
                    <h3>快速添加链接</h3>
                </div>
                <div class="quick-add-form">
                    <div class="form-row">
                        <div class="form-group flex-1">
                            <label>网站名称</label>
                            <input type="text" id="quickName" placeholder="输入网站名称">
                        </div>
                        <div class="form-group flex-1">
                            <label>网站地址</label>
                            <input type="url" id="quickUrl" placeholder="输入网址">
                        </div>
                        <div class="form-group">
                            <label>添加到分类</label>
                            <select id="quickCategory">
                                <option value="">选择分类</option>
                            </select>
                        </div>
                        <button class="btn btn-primary quick-add-btn" id="quickAddBtn">
                            <i class="fas fa-plus"></i> 添加
                        </button>
                    </div>
                </div>
            </div>
        </div>

        <div class="admin-content">
            <div class="admin-panel">
                <!-- 分类管理 -->
                <section id="categoriesSection" class="panel-section">
                    <div class="panel-header">
                        <div class="panel-title">
                            <h2>分类管理</h2>
                            <p>管理导航分类，支持拖拽调整顺序</p>
                        </div>
                        <button class="btn btn-primary" id="addCategoryBtn">
                            <i class="fas fa-plus"></i> 添加分类
                        </button>
                    </div>
                    <div id="categoriesList" class="list-container sortable">
                        <!-- 分类列表 -->
                    </div>
                </section>

                <!-- 链接管理 -->
                <section id="linksSection" class="panel-section" style="display: none;">
                    <div class="panel-header">
                        <div class="panel-title">
                            <h2>链接管理</h2>
                            <p>管理所有导航链接</p>
                        </div>
                        <div class="integrated-search">
                            <select id="linkFilterCategory">
                                <option value="">全部分类</option>
                            </select>
                            <input type="text" id="linkSearch" placeholder="搜索链接...">
                            <button id="linkSearchBtn">
                                <i class="fas fa-search"></i>
                            </button>
                        </div>
                    </div>
                    <div id="linksList" class="list-container">
                        <!-- 链接列表 -->
                    </div>
                </section>

                <!-- 个性化设置 -->
                <section id="settingsSection" class="panel-section" style="display: none;">
                    <div class="panel-header">
                        <div class="panel-title">
                            <h2>个性化设置</h2>
                            <p>自定义导航页外观和行为</p>
                        </div>
                    </div>
                    
                    <div class="settings-grid">
                        <!-- 首页标题 -->
                        <div class="setting-card">
                            <h3>首页标题</h3>
                            <div class="form-group">
                                <label>导航中心名称</label>
                                <input type="text" id="siteTitle" placeholder="导航中心">
                            </div>
                        </div>

                        <!-- 背景设置 -->
                        <div class="setting-card">
                            <h3>背景设置</h3>
                            <div class="form-group">
                                <label>在线图片URL</label>
                                <input type="url" id="bgImageUrl" placeholder="输入图片链接">
                            </div>
                            <div class="form-group">
                                <label>或选择本地图片</label>
                                <div class="local-image-upload">
                                    <label for="localBgImage" class="upload-btn">
                                        <i class="fas fa-upload"></i>
                                        <span>点击选择图片</span>
                                    </label>
                                    <input type="file" id="localBgImage" accept="image/jpeg,image/png,image/webp,image/gif,image/bmp" class="file-input">
                                    <span class="upload-hint">支持 JPG、PNG、WEBP、GIF、BMP 格式，最大 5MB</span>
                                </div>
                            </div>
                            <div class="bg-preview-container" id="bgPreviewContainer">
                                <div class="bg-preview-placeholder">
                                    <i class="fas fa-image"></i>
                                    <p>图片预览区域</p>
                                </div>
                            </div>
                            <div class="bg-actions">
                                <button class="btn btn-secondary" id="previewBgBtn">预览图片</button>
                                <button class="btn btn-primary" id="applyBgBtn">确认应用</button>
                                <button class="btn btn-secondary" id="clearBgBtn">清除背景</button>
                            </div>
                        </div>

                        <!-- 字体大小 -->
                        <div class="setting-card">
                            <h3>字体大小</h3>
                            <div class="font-size-picker">
                                <button class="font-option" data-size="small">小</button>
                                <button class="font-option" data-size="medium">中</button>
                                <button class="font-option" data-size="large">大</button>
                            </div>
                        </div>

                        <!-- 布局样式 -->
                        <div class="setting-card">
                            <h3>布局样式</h3>
                            <div class="layout-picker">
                                <button class="layout-option" data-layout="grid">网格</button>
                                <button class="layout-option" data-layout="list">列表</button>
                            </div>
                        </div>

                        <!-- 导入导出 -->
                        <div class="setting-card import-export-card">
                            <h3>数据备份</h3>
                            <button class="btn btn-primary w-full" id="exportBtn">
                                <i class="fas fa-download"></i> 导出配置
                            </button>
                            <input type="file" id="importFile" accept=".json" class="file-input">
                            <button class="btn btn-secondary w-full" id="importBtn">
                                <i class="fas fa-upload"></i> 导入配置
                            </button>
                        </div>
                    </div>

                    <div class="settings-actions">
                        <button class="btn btn-secondary" id="resetSettings">重置默认</button>
                        <button class="btn btn-primary" id="saveSettings">保存设置</button>
                    </div>
                </section>
            </div>
        </div>
    </main>

    <!-- 添加/编辑分类弹窗 -->
    <div id="categoryModal" class="modal-overlay">
        <div class="modal-content small-modal">
            <div class="modal-header">
                <h2 id="categoryModalTitle">添加分类</h2>
                <button class="modal-close" id="categoryModalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="categoryForm">
                    <div class="form-group">
                        <label>分类名称</label>
                        <input type="text" id="categoryName" required placeholder="输入分类名称">
                    </div>
                    <div class="form-group">
                        <label>排序序号</label>
                        <input type="number" id="categoryOrder" value="0" min="0">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="categoryModalCancel">取消</button>
                <button class="btn btn-primary" id="categoryModalSave">保存</button>
            </div>
        </div>
    </div>

    <!-- 添加/编辑链接弹窗 -->
    <div id="linkModal" class="modal-overlay">
        <div class="modal-content small-modal">
            <div class="modal-header">
                <h2 id="linkModalTitle">编辑链接</h2>
                <button class="modal-close" id="linkModalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <form id="linkForm">
                    <div class="form-group">
                        <label>网站名称</label>
                        <input type="text" id="linkName" required placeholder="输入网站名称">
                    </div>
                    <div class="form-group">
                        <label>网站地址</label>
                        <input type="url" id="linkUrl" required placeholder="输入网址">
                    </div>
                    <div class="form-group">
                        <label>所属分类</label>
                        <select id="linkCategory" required></select>
                    </div>
                    <div class="form-group">
                        <label>排序序号</label>
                        <input type="number" id="linkOrder" value="0" min="0">
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="linkModalCancel">取消</button>
                <button class="btn btn-primary" id="linkModalSave">保存</button>
            </div>
        </div>
    </div>

    <!-- 确认删除弹窗 -->
    <div id="confirmModal" class="modal-overlay">
        <div class="modal-content small-modal">
            <div class="modal-header">
                <h2>确认删除</h2>
                <button class="modal-close" id="confirmModalClose">
                    <i class="fas fa-times"></i>
                </button>
            </div>
            <div class="modal-body">
                <p id="confirmMessage">确定要删除吗？</p>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" id="confirmCancel">取消</button>
                <button class="btn btn-danger" id="confirmDelete">删除</button>
            </div>
        </div>
    </div>

    <footer class="footer admin-footer">
        <nav class="footer-links" aria-label="底部导航">
            <a href="index.html">首页</a>
            <a href="about.html">关于我们</a>
            <a href="feedback.html">用户反馈</a>
            <a href="admin.html">后台管理</a>
        </nav>
        <p>导航页应用 © 2024</p>
    </footer>

    <script src="admin.js"></script>
</body>
</html>
