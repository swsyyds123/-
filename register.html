<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>注册 - 导航页</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="auth-page">
        <div class="auth-container">
            <div class="auth-card">
                <div class="auth-header">
                    <div class="auth-logo">
                        <i class="fas fa-user-plus"></i>
                    </div>
                    <h1>创建账户</h1>
                    <p>开启您的导航之旅</p>
                </div>
                
                <form class="auth-form" id="registerForm">
                    <div class="form-group">
                        <label for="regUsername">用户名</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" id="regUsername" placeholder="请输入用户名" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="regEmail">邮箱</label>
                        <div class="input-wrapper">
                            <i class="fas fa-envelope"></i>
                            <input type="email" id="regEmail" placeholder="请输入邮箱" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="regPassword">密码</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="regPassword" placeholder="请输入密码（至少6位）" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="regConfirmPassword">确认密码</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" id="regConfirmPassword" placeholder="请再次输入密码" required>
                        </div>
                    </div>
                    
                    <div class="form-group form-check">
                        <label class="checkbox-label">
                            <input type="checkbox" id="agreeTerms" required>
                            我已阅读并同意<a href="#" class="auth-link">服务条款</a>和<a href="#" class="auth-link">隐私政策</a>
                        </label>
                    </div>
                    
                    <button type="submit" class="btn btn-primary w-full">
                        <i class="fas fa-user-plus"></i> 注册
                    </button>
                </form>
                
                <div class="auth-footer">
                    <p>
                        已有账户？<a href="login.html" class="auth-link">立即登录</a>
                    </p>
                </div>
            </div>
            
            <div class="auth-links">
                <a href="index.html" class="back-link">
                    <i class="fas fa-home"></i> 返回首页
                </a>
                <nav class="footer-links auth-footer-links" aria-label="底部导航">
                    <a href="index.html">首页</a>
                    <a href="about.html">关于我们</a>
                    <a href="feedback.html">用户反馈</a>
                    <a href="admin.html">后台管理</a>
                </nav>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('registerForm').addEventListener('submit', function(e) {
            e.preventDefault();
            
            const username = document.getElementById('regUsername').value;
            const email = document.getElementById('regEmail').value;
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            
            if (!username || !email || !password || !confirmPassword) {
                alert('请填写完整的注册信息');
                return;
            }
            
            if (password.length < 6) {
                alert('密码长度至少需要6位');
                return;
            }
            
            if (password !== confirmPassword) {
                alert('两次输入的密码不一致');
                return;
            }
            
            const users = JSON.parse(localStorage.getItem('users') || '[]');
            
            if (users.some(u => u.username === username)) {
                alert('该用户名已被注册');
                return;
            }
            
            if (users.some(u => u.email === email)) {
                alert('该邮箱已被注册');
                return;
            }
            
            users.push({
                id: Date.now().toString(),
                username: username,
                email: email,
                password: password,
                createdAt: Date.now()
            });
            
            localStorage.setItem('users', JSON.stringify(users));
            
            localStorage.setItem('currentUser', JSON.stringify({
                username: username,
                loginTime: Date.now(),
                expiresAt: Date.now() + 2 * 60 * 60 * 1000
            }));
            
            alert('注册成功！');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
